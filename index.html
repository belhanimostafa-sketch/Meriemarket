            <!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1020" />
  <title>Meriemarket - Pi Payment Support</title>
  <link rel="icon" href="./logo.jpg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

        
  <script>
    (async function() {
      const statusEl = document.getElementById('statusDisplay');
      const btn = document.getElementById('payBtn');

      // تهيئة Pi SDK
      if (!window.Pi) {
        statusEl.textContent = "Pi SDK غير موجود";
        return;
      }

      try {
        await window.Pi.init({ version: "2.0", sandbox: true });
        statusEl.textContent = "جاري المصادقة...";

        const auth = await window.Pi.authenticate(["username", "payments"]);
        
        const username = auth.user.username;
        document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
        document.getElementById('usernameDisplay').textContent = username;
        statusEl.textContent = "جاهز ✅";

        // زر الدفع - أبسط شكل ممكن
        btn.onclick = () => {
          statusEl.textContent = "جاري إنشاء الدفع...";

          const paymentData = {
            amount: 1.0,
            memo: "Support 1 Pi",
            metadata: { kind: "support" }
          };

          const callbacks = {
            onReadyForServerApproval: (paymentId) => {
              statusEl.textContent = "✅ تم إنشاء الدفع\nوافق بسرعة!";
            },
            onReadyForServerCompletion: (paymentId, txid) => {
              statusEl.textContent = "🎉 تم الدفع بنجاح! شكراً";
            },
            onCancel: () => statusEl.textContent = "❌ تم الإلغاء",
            onError: (err) => statusEl.textContent = "❌ خطأ: " + err.message
          };

          window.Pi.createPayment(paymentData, callbacks);
        };

      } catch (e) {
        statusEl.textContent = "فشل: " + (e.message || e);
        console.error(e);
      }
    })();
  </script>
</body>
</html>
