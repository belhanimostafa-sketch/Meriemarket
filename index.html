<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meriemarket</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { 
      background: #0b1020; 
      color: white; 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 80px 20px; 
    }
    button { 
      padding: 18px 40px; 
      font-size: 18px; 
      background: #4f86ff; 
      color: white; 
      border: none; 
      border-radius: 50px; 
      margin: 30px 0; 
    }
    #status { margin: 25px; font-size: 17px; min-height: 70px; }
  </style>
</head>
<body>
  <h1>Meriemarket Test</h1>
  <div id="status">جاري التحميل...</div>
  <button id="payBtn">Support 1 Pi</button>

  <script>
    const status = document.getElementById('status');
    const btn = document.getElementById('payBtn');

    async function initApp() {
      try {
        await Pi.init({ version: "2.0", sandbox: true });
        const auth = await Pi.authenticate(["username", "payments"]);
        status.textContent = `مرحبا ${auth.user.username} ✅`;

        btn.onclick = () => {
          status.textContent = "🔄 جاري إنشاء الدفع...";

          Pi.createPayment({
            amount: 1,
            memo: "Support Test",
            metadata: { kind: "test" }
          }, {
            onReadyForServerApproval: () => status.textContent = "✅ تم الإنشاء!\nوافق فوراً!",
            onReadyForServerCompletion: () => status.textContent = "🎉 تم الدفع بنجاح!",
            onCancel: () => status.textContent = "❌ إلغاء",
            onError: (err) => status.textContent = "❌ " + err.message
          });
        };
      } catch (e) {
        status.textContent = "خطأ: " + e.message;
      }
    }

    initApp();
  </script>
</body>
</html>
