            <!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meriemarket - Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body {
      background: #0b1020;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
  </style>
</head>
<body>
  <h1>Meriemarket Test</h1>
  <p id="status">جاري التحميل...</p>
  <button id="payBtn" style="padding:15px 30px; font-size:18px; margin-top:20px;">Support 1 Pi</button>

  <script>
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('payBtn');

    statusEl.textContent = "جاري تهيئة Pi SDK...";

    Pi.init({ version: "2.0", sandbox: true })
      .then(() => {
        statusEl.textContent = "✅ Pi SDK جاهز - جاري تسجيل الدخول...";
        return Pi.authenticate(["username", "payments"]);
      })
      .then(auth => {
        statusEl.textContent = `✅ مرحبا ${auth.user.username}`;
        
        btn.onclick = () => {
          statusEl.textContent = "جاري إنشاء الدفع...";
          
          Pi.createPayment({
            amount: 1,
            memo: "Support Test",
            metadata: { kind: "test" }
          }, {
            onReadyForServerApproval: () => statusEl.textContent = "✅ تم الإنشاء - وافق الآن",
            onReadyForServerCompletion: () => statusEl.textContent = "🎉 تم الدفع بنجاح!",
            onCancel: () => statusEl.textContent = "❌ إلغاء",
            onError: (err) => statusEl.textContent = "❌ خطأ: " + err.message
          });
        };
      })
      .catch(err => {
        statusEl.textContent = "❌ خطأ: " + err.message;
        console.error(err);
      });
  </script>
</body>
</html>
